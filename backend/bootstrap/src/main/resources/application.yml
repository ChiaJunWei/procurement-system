spring:
  application:
    name: gov-procurement-platform

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/procurement}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_user}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate            # schema is owned by Flyway, never by Hibernate
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
    schemas: [identity, agency, procurement, vendor, contract, workflow, policy, audit, integration, reporting]
    default-schema: procurement

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/procurement}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

platform:
  outbox:
    poll-interval-ms: 1000
  audit:
    topic-pattern: ".*\\.events\\.v[0-9]+"

management:
  endpoints:
    web:
      exposure:
        include: [health, info, prometheus]
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [tenant=%X{tenantId} corr=%X{correlationId}]"
